<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>MyPortfolio</h2>
  <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
  <button id="toggleMode">🌙</button>
</header>

<section id="home" class="hero">
  <img src="profile.jpg" alt="profile">
  <h1>Hi, I'm <span>Your Name</span></h1>
  <p>Frontend Developer | Student</p>
</section>

<section id="about">
  <h2>About Me</h2>
  <p>I build websites using HTML, CSS, JS and love automation.</p>
</section>

<section id="projects">
  <h2>Projects</h2>

  <div class="card">
    <h3>Blog Website</h3>
    <p>Full responsive blog using HTML CSS JS</p>
  </div>

  <div class="card">
    <h3>IoT Smart Home</h3>
    <p>Arduino + WiFi automation system</p>
  </div>

</section>

<section id="contact">
  <h2>Contact</h2>
  <input type="text" placeholder="Name">
  <input type="email" placeholder="Email">
  <textarea placeholder="Message"></textarea>
  <button onclick="sendMsg()">Send</button>
</section>

<footer>
  <p>© 2026 Your Name</p>
</footer>

<script src="script.js"></script>
</body>
</html>
